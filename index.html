<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarilla Labs — Documentos legales</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181b22;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #4ade80;
      --border: #2a2e37;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      font-size: 16px;
      min-height: 100vh;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 32px;
    }
    h1 { font-size: 2rem; margin: 0 0 8px; }
    .tagline { color: var(--muted); margin: 0; }
    h2 {
      font-size: 1.15rem;
      margin: 40px 0 4px;
      color: var(--accent);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .app {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin: 20px 0;
    }
    .app h3 { margin: 0 0 4px; font-size: 1.2rem; }
    .app p.desc { color: var(--muted); margin: 0 0 14px; font-size: 0.95rem; }
    .links { display: flex; flex-wrap: wrap; gap: 16px; }
    .links a { font-size: 0.95rem; }
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Jarilla Labs</h1>
      <p class="tagline">Documentos legales y políticas de privacidad de nuestras apps.</p>
    </header>

    <div class="app">
      <h3>Time2Bar</h3>
      <p class="desc">Temporizador de intervalos y gestor de sesiones de entrenamiento de calistenia.</p>
      <div class="links">
        <a href="/time2bar/privacidad/">Política de privacidad →</a>
      </div>
    </div>

    <!--
      Para añadir una nueva app, copia el bloque .app de arriba y crea
      su carpeta legal, p. ej.:  /nombre-app/privacidad/index.html
    -->

    <footer>
      © 2026 Jarilla Labs. Todos los derechos reservados.
    </footer>
  </div>
</body>
</html>
